<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Cowabunga College banner</title>
  <desc id="desc">A pizza-themed banner reading Cowabunga College.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#14532d" />
      <stop offset="100%" stop-color="#7c2d12" />
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />

  <circle cx="180" cy="140" r="90" fill="#ffffff" fill-opacity="0.08" />
  <circle cx="1120" cy="520" r="120" fill="#ffffff" fill-opacity="0.07" />
  <circle cx="1080" cy="120" r="58" fill="#ffffff" fill-opacity="0.08" />

  <g filter="url(#softShadow)">
    <polygon points="165,470 335,225 470,470" fill="url(#cheese)" stroke="#b45309" stroke-width="8" />
    <path d="M145 490 Q319 535 490 490" fill="none" stroke="#b45309" stroke-width="24" stroke-linecap="round" />
    <circle cx="275" cy="336" r="16" fill="#dc2626" />
    <circle cx="343" cy="389" r="18" fill="#dc2626" />
    <circle cx="230" cy="407" r="15" fill="#dc2626" />
    <circle cx="315" cy="442" r="14" fill="#dc2626" />
    <circle cx="383" cy="326" r="14" fill="#dc2626" />
  </g>

  <g font-family="Trebuchet MS, Verdana, Segoe UI, sans-serif" text-anchor="start" fill="#fefce8">
    <text x="535" y="262" font-size="98" font-weight="800" letter-spacing="2">COWABUNGA</text>
    <text x="535" y="362" font-size="98" font-weight="800" letter-spacing="2">COLLEGE</text>
    <text x="537" y="430" font-size="36" font-weight="600" fill="#fde68a">Pizza Powered Learning</text>
  </g>

  <g filter="url(#softShadow)">
    <polygon points="1040,198 1120,82 1180,198" fill="url(#cheese)" stroke="#b45309" stroke-width="6" />
    <path d="M1028 210 Q1110 236 1192 210" fill="none" stroke="#b45309" stroke-width="14" stroke-linecap="round" />
    <circle cx="1110" cy="148" r="10" fill="#dc2626" />
    <circle cx="1150" cy="170" r="9" fill="#dc2626" />
    <circle cx="1084" cy="174" r="9" fill="#dc2626" />
  </g>
</svg>
