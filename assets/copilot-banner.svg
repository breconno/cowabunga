<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Cowabunga College banner</title>
  <desc id="desc">A pizza-shuriken emblem beside the Cowabunga College wordmark and a terminal prompt line, set against a sewer-grate dojo backdrop.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081411" />
      <stop offset="45%" stop-color="#0c231c" />
      <stop offset="100%" stop-color="#03100e" />
    </linearGradient>

    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe08a" />
      <stop offset="100%" stop-color="#e8a33d" />
    </linearGradient>

    <linearGradient id="slash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cff6b" stop-opacity="0" />
      <stop offset="45%" stop-color="#7cff6b" stop-opacity="0.55" />
      <stop offset="55%" stop-color="#eafff0" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#7cff6b" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#7cff6b" stop-opacity="0" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7cff6b" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#7cff6b" stop-opacity="0" />
    </radialGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5" />
    </filter>

    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grate" width="42" height="42" patternUnits="userSpaceOnUse">
      <rect width="42" height="42" fill="none" />
      <path d="M0 0 L42 0 M0 0 L0 42" stroke="#7cff6b" stroke-opacity="0.06" stroke-width="1.5" />
      <circle cx="0" cy="0" r="1.4" fill="#7cff6b" fill-opacity="0.12" />
    </pattern>

    <g id="pizzaBlade">
      <path d="M0,0 L58,-14 A64,64 0 0 1 58,14 Z" fill="url(#cheese)" stroke="#7c4a12" stroke-width="4" stroke-linejoin="round" />
      <circle cx="30" cy="-4" r="4.4" fill="#c23b3b" />
      <circle cx="40" cy="6" r="3.6" fill="#c23b3b" />
      <circle cx="22" cy="7" r="3.2" fill="#c23b3b" />
    </g>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <rect width="1280" height="640" fill="url(#grate)" />

  <circle cx="150" cy="120" r="110" fill="url(#glow)" opacity="0.35" />
  <circle cx="1150" cy="540" r="140" fill="url(#glow)" opacity="0.25" />

  <!-- katana slash accent behind the wordmark -->
  <rect x="430" y="150" width="760" height="46" fill="url(#slash)" transform="rotate(-6 430 150)" />
  <rect x="430" y="330" width="760" height="30" fill="url(#slash)" opacity="0.6" transform="rotate(-6 430 330)" />

  <!-- pizza shuriken emblem -->
  <g filter="url(#softShadow)" transform="translate(215 320)">
    <circle r="150" fill="#0c231c" stroke="#7cff6b" stroke-opacity="0.25" stroke-width="2" />
    <g filter="url(#neonGlow)">
      <use href="#pizzaBlade" transform="rotate(0)" />
      <use href="#pizzaBlade" transform="rotate(90)" />
      <use href="#pizzaBlade" transform="rotate(180)" />
      <use href="#pizzaBlade" transform="rotate(270)" />
    </g>
    <circle r="17" fill="#0f2c22" stroke="#7cff6b" stroke-width="3" />
    <circle r="6" fill="#7cff6b" />
  </g>

  <!-- wordmark -->
  <g font-family="'Arial Black', 'Trebuchet MS', Impact, sans-serif" text-anchor="start" fill="#f4fbf5">
    <text x="500" y="248" font-size="94" font-weight="900" letter-spacing="1">COWABUNGA</text>
    <text x="500" y="342" font-size="94" font-weight="900" letter-spacing="1" fill="#7cff6b">COLLEGE</text>
  </g>

  <!-- terminal prompt line -->
  <g font-family="'Courier New', ui-monospace, monospace" font-size="27">
    <rect x="500" y="378" width="612" height="54" rx="8" fill="#03100e" stroke="#7cff6b" stroke-opacity="0.35" stroke-width="1.5" />
    <circle cx="524" cy="405" r="5" fill="#c23b3b" />
    <circle cx="544" cy="405" r="5" fill="#e8a33d" />
    <circle cx="564" cy="405" r="5" fill="#7cff6b" />
    <text x="588" y="414" fill="#7cff6b">copilot --learn --pizza-powered</text>
    <rect x="1082" y="396" width="14" height="24" fill="#7cff6b">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" />
    </rect>
  </g>

  <text x="502" y="470" font-family="Trebuchet MS, Verdana, sans-serif" font-size="30" font-weight="600" fill="#e8a33d">Pizza-Powered, Terminal-First Agent Ops</text>

  <!-- small corner shuriken accents -->
  <g filter="url(#neonGlow)" opacity="0.8" transform="translate(1150 100) scale(0.42)">
    <use href="#pizzaBlade" transform="rotate(15)" />
    <use href="#pizzaBlade" transform="rotate(105)" />
    <use href="#pizzaBlade" transform="rotate(195)" />
    <use href="#pizzaBlade" transform="rotate(285)" />
  </g>
</svg>
