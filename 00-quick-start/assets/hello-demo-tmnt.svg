<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">TMNT Hello Demo Placeholder</title>
  <desc id="desc">Stylized terminal screenshot showing a hello prompt and response, dojo-themed.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081411" />
      <stop offset="45%" stop-color="#0c231c" />
      <stop offset="100%" stop-color="#03100e" />
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe08a" />
      <stop offset="100%" stop-color="#e8a33d" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45" />
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grate" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M0 0 L42 0 M0 0 L0 42" stroke="#7cff6b" stroke-opacity="0.06" stroke-width="1.5" />
    </pattern>
    <g id="pizzaBlade">
      <path d="M0,0 L44,-11 A48,48 0 0 1 44,11 Z" fill="url(#cheese)" stroke="#7c4a12" stroke-width="3" stroke-linejoin="round" />
      <circle cx="23" cy="-3" r="3.3" fill="#c23b3b" />
      <circle cx="30" cy="4.5" r="2.7" fill="#c23b3b" />
      <circle cx="17" cy="5.5" r="2.4" fill="#c23b3b" />
    </g>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" />
  <rect width="1200" height="700" fill="url(#grate)" />
  <circle cx="90" cy="70" r="110" fill="#7cff6b" opacity="0.06" />

  <rect x="60" y="56" width="1080" height="588" rx="16" fill="#0c231c" stroke="#7cff6b" stroke-opacity="0.55" stroke-width="3" filter="url(#softShadow)" />
  <rect x="60" y="56" width="1080" height="52" rx="16" fill="#123222" />
  <rect x="60" y="88" width="1080" height="20" fill="#123222" />

  <circle cx="96" cy="82" r="8" fill="#c23b3b" />
  <circle cx="122" cy="82" r="8" fill="#e8a33d" />
  <circle cx="148" cy="82" r="8" fill="#7cff6b" />
  <text x="180" y="90" font-size="22" font-family="Verdana, Geneva, sans-serif" fill="#d8f5de">copilot session — dojo quick start</text>

  <g font-family="Courier New, monospace" font-size="26" fill="#d7ffe0">
    <text x="100" y="170">&gt; Say hello and tell me what you can help with</text>
    <text x="100" y="222" fill="#7cff6b">Copilot: Cowabunga! I can help you inspect files, explain code,</text>
    <text x="100" y="264" fill="#7cff6b">run safe commands, and guide beginner-friendly debugging.</text>
    <text x="100" y="336">Try next: /help</text>
    <text x="100" y="378">Try next: What does @samples/tmnt-stub/pizza_recipe_app.py do?</text>
  </g>

  <rect x="94" y="454" width="1012" height="132" rx="12" fill="#0f2c22" stroke="#7cff6b" stroke-width="2" />
  <text x="120" y="504" font-size="24" font-family="Verdana, Geneva, sans-serif" fill="#b9efc7">Demo output varies by model and tools.</text>
  <text x="120" y="542" font-size="24" font-family="Verdana, Geneva, sans-serif" fill="#b9efc7">This chapter uses a TMNT pizza-recipe stub for explanation only.</text>

  <g filter="url(#neonGlow)" transform="translate(1035 588)">
    <use href="#pizzaBlade" transform="rotate(0)" />
    <use href="#pizzaBlade" transform="rotate(90)" />
    <use href="#pizzaBlade" transform="rotate(180)" />
    <use href="#pizzaBlade" transform="rotate(270)" />
    <circle r="12" fill="#0f2c22" stroke="#7cff6b" stroke-width="2.5" />
    <circle r="4" fill="#7cff6b" />
  </g>
</svg>
