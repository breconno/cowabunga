<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">TMNT Hello Demo Placeholder</title>
  <desc id="desc">Stylized terminal screenshot showing a hello prompt and response.</desc>
  <rect width="1200" height="700" fill="#0e2418" />
  <rect x="60" y="56" width="1080" height="588" rx="16" fill="#112e1e" stroke="#ff8b2b" stroke-width="4" />
  <rect x="60" y="56" width="1080" height="52" rx="16" fill="#1c4730" />
  <text x="96" y="91" font-size="22" font-family="Verdana, Geneva, sans-serif" fill="#d8f5de">copilot session - tmnt quick start</text>

  <g font-family="Courier New, monospace" font-size="26" fill="#d7ffe0">
    <text x="100" y="170">&gt; Say hello and tell me what you can help with</text>
    <text x="100" y="222">Copilot: Cowabunga! I can help you inspect files, explain code,</text>
    <text x="100" y="264">run safe commands, and guide beginner-friendly debugging.</text>
    <text x="100" y="336">Try next: /help</text>
    <text x="100" y="378">Try next: What does @samples/tmnt-stub/pizza_recipe_app.py do?</text>
  </g>

  <rect x="94" y="454" width="1012" height="132" rx="12" fill="#183d28" stroke="#5fd67e" stroke-width="2" />
  <text x="120" y="504" font-size="24" font-family="Verdana, Geneva, sans-serif" fill="#b9efc7">Demo output varies by model and tools.</text>
  <text x="120" y="542" font-size="24" font-family="Verdana, Geneva, sans-serif" fill="#b9efc7">This chapter uses a TMNT pizza-recipe stub for explanation only.</text>

  <circle cx="1035" cy="588" r="60" fill="#f2c078" stroke="#d8892d" stroke-width="6" />
  <circle cx="1010" cy="575" r="8" fill="#be2f27" />
  <circle cx="1054" cy="562" r="8" fill="#be2f27" />
  <circle cx="1062" cy="604" r="8" fill="#be2f27" />
  <circle cx="1002" cy="612" r="8" fill="#be2f27" />
</svg>
