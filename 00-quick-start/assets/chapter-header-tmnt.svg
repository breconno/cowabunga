<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 00 TMNT Quick Start Banner</title>
  <desc id="desc">TMNT-themed chapter header with pizza-inspired colors and beginner-friendly setup messaging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3a21" />
      <stop offset="100%" stop-color="#1f5f31" />
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a18" />
      <stop offset="100%" stop-color="#ffb347" />
    </linearGradient>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)" />
  <rect x="0" y="0" width="1600" height="28" fill="url(#stripe)" />
  <rect x="0" y="392" width="1600" height="28" fill="url(#stripe)" />

  <circle cx="1420" cy="110" r="120" fill="#f4d35e" opacity="0.25" />
  <circle cx="180" cy="320" r="95" fill="#f4d35e" opacity="0.2" />

  <g fill="#0b2a17" opacity="0.35">
    <path d="M0 240 C160 180, 320 280, 480 220 C640 160, 800 260, 960 210 C1120 160, 1280 240, 1600 180 L1600 420 L0 420 Z" />
  </g>

  <text x="90" y="145" font-size="52" font-family="Verdana, Geneva, sans-serif" fill="#f8fff4" font-weight="700">Chapter 00: Quick Start</text>
  <text x="90" y="205" font-size="32" font-family="Verdana, Geneva, sans-serif" fill="#d9f7df">Cowabunga setup in under 10 minutes</text>
  <text x="90" y="255" font-size="26" font-family="Verdana, Geneva, sans-serif" fill="#ffcf86">Install. Login. Verify. Pizza-powered confidence.</text>

  <g transform="translate(1210 220)">
