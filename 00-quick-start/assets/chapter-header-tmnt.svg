<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Chapter 00 Quick Start Banner</title>
  <desc id="desc">Dojo-themed chapter header with a pizza-shuriken emblem and beginner-friendly setup messaging.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081411" />
      <stop offset="45%" stop-color="#0c231c" />
      <stop offset="100%" stop-color="#03100e" />
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe08a" />
      <stop offset="100%" stop-color="#e8a33d" />
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cff6b" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0c231c" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="slash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cff6b" stop-opacity="0" />
      <stop offset="50%" stop-color="#7cff6b" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#7cff6b" stop-opacity="0" />
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grate" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M0 0 L42 0 M0 0 L0 42" stroke="#7cff6b" stroke-opacity="0.06" stroke-width="1.5" />
    </pattern>
    <g id="pizzaBlade">
      <path d="M0,0 L52,-13 A56,56 0 0 1 52,13 Z" fill="url(#cheese)" stroke="#7c4a12" stroke-width="3.5" stroke-linejoin="round" />
      <circle cx="27" cy="-3.6" r="3.8" fill="#c23b3b" />
      <circle cx="35" cy="5.2" r="3.1" fill="#c23b3b" />
      <circle cx="20" cy="6.3" r="2.8" fill="#c23b3b" />
    </g>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)" />
  <rect width="1600" height="420" fill="url(#grate)" />
  <rect x="0" y="0" width="1600" height="10" fill="url(#stripe)" />
  <rect x="0" y="410" width="1600" height="10" fill="url(#stripe)" />

  <circle cx="1420" cy="110" r="120" fill="#7cff6b" opacity="0.08" />
  <circle cx="180" cy="320" r="95" fill="#7cff6b" opacity="0.06" />

  <rect x="60" y="128" width="820" height="34" fill="url(#slash)" transform="rotate(-4 60 128)" />

  <text x="90" y="145" font-size="52" font-family="Verdana, Geneva, sans-serif" fill="#f8fff4" font-weight="700">Chapter 00: Quick Start</text>
  <text x="90" y="205" font-size="32" font-family="Verdana, Geneva, sans-serif" fill="#7cff6b">Cowabunga setup in under 10 minutes</text>
  <text x="90" y="255" font-size="26" font-family="Verdana, Geneva, sans-serif" fill="#e8a33d">Install. Login. Verify. Pizza-powered confidence.</text>

  <g filter="url(#softShadow)" transform="translate(1210 220)">
    <circle r="100" fill="#0c231c" stroke="#7cff6b" stroke-opacity="0.3" stroke-width="2" />
    <g filter="url(#neonGlow)">
      <use href="#pizzaBlade" transform="rotate(0)" />
      <use href="#pizzaBlade" transform="rotate(90)" />
      <use href="#pizzaBlade" transform="rotate(180)" />
      <use href="#pizzaBlade" transform="rotate(270)" />
    </g>
    <circle r="13" fill="#0f2c22" stroke="#7cff6b" stroke-width="2.5" />
    <circle r="4.5" fill="#7cff6b" />
  </g>
</svg>
