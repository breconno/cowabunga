    <circle cx="-26" cy="-20" r="11" fill="#be2f27" />
    <circle cx="20" cy="-28" r="10" fill="#be2f27" />
    <circle cx="30" cy="16" r="9" fill="#be2f27" />
    <circle cx="-10" cy="30" r="10" fill="#be2f27" />
    <rect x="-72" y="-8" width="144" height="16" fill="#ff7a18" opacity="0.9" />
