<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="565" viewBox="0 0 1200 565" role="img" aria-labelledby="title desc">
  <title id="title">Practice</title>
  <desc id="desc">A cozy dojo desk at night: lamp-lit monitor with glowing code, a mug of tea, headphones, and a pizza box.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03100e" /><stop offset="55%" stop-color="#0a1f16" /><stop offset="100%" stop-color="#03100e" />
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe08a" stop-opacity="0.55" /><stop offset="100%" stop-color="#ffe08a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a4a30" stop-opacity="0.9" /><stop offset="100%" stop-color="#0a1f16" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe08a" /><stop offset="100%" stop-color="#e8a33d" /></linearGradient>
    <pattern id="grate" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M0 0 L36 0 M0 0 L0 36" stroke="#7cff6b" stroke-opacity="0.05" stroke-width="1.3" />
    </pattern>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="565" fill="url(#bg)" />
  <rect width="1200" height="565" fill="url(#grate)" />
  <circle cx="600" cy="230" r="320" fill="url(#screenGlow)" opacity="0.5" />

  <!-- desk -->
  <rect x="0" y="470" width="1200" height="95" fill="#0a1f16" />
  <rect x="0" y="470" width="1200" height="4" fill="#7cff6b" opacity="0.25" />

  <!-- lamp -->
  <g transform="translate(150 110)">
    <circle r="90" fill="url(#lampGlow)" />
    <path d="M0,0 L-40,120 M0,0 L40,120" stroke="#123222" stroke-width="6" stroke-linecap="round" />
    <path d="M-46,120 L46,120 L26,80 L-26,80 Z" fill="#0f2c22" stroke="#e8a33d" stroke-width="3" />
    <rect x="-6" y="120" width="12" height="80" fill="#123222" />
    <rect x="-30" y="196" width="60" height="14" rx="4" fill="#123222" />
    <ellipse cx="0" cy="128" rx="30" ry="8" fill="#ffe08a" opacity="0.6" filter="url(#neonGlow)" />
  </g>

  <!-- plant -->
  <g transform="translate(70 400)">
    <path d="M-16,60 L16,60 L10,20 L-10,20 Z" fill="#123222" stroke="#7cff6b" stroke-opacity="0.4" stroke-width="2" />
    <path d="M0,20 C-20,0 -26,-30 -12,-44 C-8,-24 -2,-8 0,20 Z" fill="#1a4a30" />
    <path d="M0,20 C18,-2 26,-32 14,-48 C8,-26 2,-8 0,20 Z" fill="#245c39" />
    <path d="M0,20 C2,-6 2,-24 -4,-38 C2,-24 4,-6 0,20 Z" fill="#7cff6b" opacity="0.7" />
  </g>

  <!-- monitor -->
  <g transform="translate(400 145)">
    <rect x="-10" y="-10" width="440" height="270" rx="14" fill="#03100e" stroke="#e8a33d" stroke-width="3" />
    <rect x="6" y="6" width="408" height="238" fill="#050f0c" />
    <circle cx="20" cy="-2" r="5" fill="#c23b3b" /><circle cx="36" cy="-2" r="5" fill="#e8a33d" opacity="0" />
    <circle cx="405" cy="234" r="5" fill="#e8a33d" /><circle cx="390" cy="234" r="5" fill="#7cff6b" />
    <rect x="205" y="270" width="30" height="40" fill="#0a1f16" />
    <rect x="150" y="310" width="140" height="14" rx="6" fill="#123222" />

    <g font-family="Courier New, monospace" font-size="15">
      <rect x="26" y="30" width="16" height="10" fill="#245c39" /><rect x="50" y="30" width="120" height="10" fill="#7cff6b" opacity="0.85" />
      <rect x="26" y="54" width="16" height="10" fill="#245c39" /><rect x="50" y="54" width="90" height="10" fill="#e8a33d" opacity="0.85" /><rect x="150" y="54" width="70" height="10" fill="#7cff6b" opacity="0.6" />
      <rect x="26" y="78" width="16" height="10" fill="#245c39" /><rect x="50" y="78" width="60" height="10" fill="#f4fbf5" opacity="0.7" />
      <rect x="26" y="102" width="16" height="10" fill="#245c39" /><rect x="50" y="102" width="150" height="10" fill="#e8a33d" opacity="0.85" />
      <rect x="26" y="126" width="16" height="10" fill="#245c39" /><rect x="50" y="126" width="100" height="10" fill="#7cff6b" opacity="0.85" /><rect x="160" y="126" width="50" height="10" fill="#f4fbf5" opacity="0.5" />
      <rect x="26" y="150" width="16" height="10" fill="#245c39" /><rect x="50" y="150" width="80" height="10" fill="#7cff6b" opacity="0.6" />
      <rect x="26" y="174" width="16" height="10" fill="#245c39" /><rect x="50" y="174" width="130" height="10" fill="#e8a33d" opacity="0.7" />
      <rect x="26" y="198" width="10" height="10" fill="#7cff6b" opacity="0.9" />
    </g>
  </g>

  <!-- keyboard -->
  <g transform="translate(370 440)">
    <rect x="0" y="0" width="300" height="26" rx="6" fill="#0f2c22" stroke="#7cff6b" stroke-opacity="0.4" stroke-width="2" />
    <g fill="#e8a33d" opacity="0.55">
      <rect x="8" y="6" width="14" height="14" rx="2" /><rect x="26" y="6" width="14" height="14" rx="2" /><rect x="44" y="6" width="14" height="14" rx="2" />
      <rect x="62" y="6" width="14" height="14" rx="2" /><rect x="80" y="6" width="14" height="14" rx="2" /><rect x="98" y="6" width="14" height="14" rx="2" />
      <rect x="116" y="6" width="14" height="14" rx="2" /><rect x="134" y="6" width="14" height="14" rx="2" /><rect x="152" y="6" width="14" height="14" rx="2" />
      <rect x="170" y="6" width="14" height="14" rx="2" /><rect x="188" y="6" width="14" height="14" rx="2" /><rect x="206" y="6" width="14" height="14" rx="2" />
      <rect x="224" y="6" width="14" height="14" rx="2" /><rect x="242" y="6" width="14" height="14" rx="2" /><rect x="260" y="6" width="14" height="14" rx="2" /><rect x="278" y="6" width="14" height="14" rx="2" />
    </g>
  </g>

  <!-- mouse -->
  <g transform="translate(700 440)">
    <rect x="0" y="0" width="60" height="90" rx="26" fill="#0f2c22" stroke="#7cff6b" stroke-opacity="0.4" stroke-width="2" />
  </g>

  <!-- mug with steam -->
  <g transform="translate(220 420)">
    <path d="M0,0 h40 v26 a20,20 0 0 1 -40,0 Z" fill="#0f2c22" stroke="#e8a33d" stroke-width="2.5" />
    <path d="M40,7 q16,0 16,14 q0,14 -16,14" fill="none" stroke="#e8a33d" stroke-width="2.5" />
    <path d="M8,-10 q-5,-12 0,-22 M22,-10 q-5,-12 0,-22 M32,-10 q-5,-12 0,-22" fill="none" stroke="#f4fbf5" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- pizza box stack (instead of sticky notes) -->
  <g transform="translate(880 420)">
    <rect x="0" y="20" width="70" height="16" rx="2" fill="url(#cheese)" stroke="#7c4a12" stroke-width="1.5" />
    <rect x="4" y="4" width="62" height="16" rx="2" fill="#e8a33d" stroke="#7c4a12" stroke-width="1.5" />
  </g>

  <!-- pen holder -->
  <g transform="translate(980 420)">
    <rect x="0" y="20" width="34" height="36" rx="4" fill="#0f2c22" stroke="#7cff6b" stroke-opacity="0.4" stroke-width="2" />
    <rect x="6" y="-6" width="4" height="30" fill="#e8a33d" />
    <rect x="16" y="-14" width="4" height="38" fill="#7cff6b" />
    <rect x="26" y="-2" width="4" height="26" fill="#c23b3b" />
  </g>

  <!-- headphones on stand -->
  <g transform="translate(1060 400)">
    <rect x="-4" y="30" width="8" height="60" fill="#0f2c22" />
    <rect x="-30" y="86" width="60" height="10" rx="4" fill="#0f2c22" />
    <path d="M-36,30 a36,36 0 0 1 72,0" fill="none" stroke="#7cff6b" stroke-width="6" />
    <rect x="-42" y="24" width="14" height="34" rx="7" fill="#0f2c22" stroke="#7cff6b" stroke-width="2.5" />
    <rect x="28" y="24" width="14" height="34" rx="7" fill="#0f2c22" stroke="#7cff6b" stroke-width="2.5" />
  </g>

  <!-- window with faint moon accent, top right -->
  <g transform="translate(1130 90)" opacity="0.6">
    <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#245c39" stroke-width="3" />
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#245c39" stroke-width="3" />
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#245c39" stroke-width="3" />
    <circle cx="0" cy="0" r="18" fill="#e8a33d" opacity="0.5" />
  </g>
</svg>
