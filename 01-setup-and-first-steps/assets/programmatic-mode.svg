<svg xmlns="http://www.w3.org/2000/svg" width="360" height="460" viewBox="0 0 360 460" role="img" aria-labelledby="title desc">
  <title id="title">Programmatic Mode</title>
  <desc id="desc">A car picking up a quick order at a dojo takeout window, representing Programmatic Mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c231c" /><stop offset="100%" stop-color="#03100e" />
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a1f1f" /><stop offset="100%" stop-color="#3a1414" />
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe08a" /><stop offset="100%" stop-color="#e8a33d" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <pattern id="grate" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M0 0 L36 0 M0 0 L0 36" stroke="#7cff6b" stroke-opacity="0.06" stroke-width="1.3" />
    </pattern>
  </defs>

  <rect width="360" height="460" rx="20" fill="url(#bg)" stroke="#e8a33d" stroke-width="2.5" filter="url(#softShadow)" />
  <rect width="360" height="460" rx="20" fill="url(#grate)" />

  <path d="M0,20 A20,20 0 0 1 20,0 L340,0 A20,20 0 0 1 360,20 L360,78 L0,78 Z" fill="url(#header)" />
  <text x="180" y="48" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="27" font-weight="700" fill="#f4fbf5">Programmatic Mode</text>
  <rect x="26" y="64" width="308" height="2" fill="#e8a33d" opacity="0.5" />

  <rect x="20" y="96" width="320" height="232" rx="14" fill="#0a1f16" stroke="#e8a33d" stroke-opacity="0.25" stroke-width="2" />

  <!-- takeout window -->
  <g transform="translate(255 150)">
    <rect x="-70" y="-30" width="150" height="150" fill="#2a3d33" stroke="#7cff6b" stroke-opacity="0.4" stroke-width="2" />
    <rect x="-55" y="-15" width="90" height="65" rx="4" fill="#0f2c22" stroke="#e8a33d" stroke-width="3" />
    <rect x="-45" y="-4" width="70" height="10" rx="2" fill="url(#cheese)" />
    <rect x="-45" y="12" width="70" height="10" rx="2" fill="url(#cheese)" opacity="0.7" />
    <!-- turtle vendor -->
    <circle cx="0" cy="34" r="17" fill="#1a4a30" stroke="#7cff6b" stroke-width="2.5" />
    <rect x="-17" y="30" width="34" height="8" fill="#0a1f16" />
    <rect x="-16" y="52" width="32" height="26" fill="#e8a33d" />
  </g>

  <!-- car from behind -->
  <g transform="translate(95 250)">
    <rect x="-70" y="-30" width="140" height="55" rx="18" fill="#1c3d54" stroke="#7cff6b" stroke-opacity="0.5" stroke-width="2" />
    <rect x="-50" y="-52" width="100" height="30" rx="10" fill="#1c3d54" stroke="#7cff6b" stroke-opacity="0.5" stroke-width="2" />
    <circle cx="-40" cy="26" r="14" fill="#0a1f16" stroke="#7cff6b" stroke-width="2" />
    <circle cx="40" cy="26" r="14" fill="#0a1f16" stroke="#7cff6b" stroke-width="2" />
    <rect x="-58" y="-8" width="14" height="8" rx="2" fill="#c23b3b" />
    <rect x="44" y="-8" width="14" height="8" rx="2" fill="#c23b3b" />
  </g>

  <line x1="26" y1="344" x2="334" y2="344" stroke="#e8a33d" stroke-opacity="0.3" stroke-width="2" />
  <text x="26" y="380" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="700" fill="#f4fbf5">Dojo takeout window</text>
  <text x="26" y="414" font-family="Verdana, Geneva, sans-serif" font-size="18" fill="#f0d3a8">Quick specific request — get your</text>
  <text x="26" y="438" font-family="Verdana, Geneva, sans-serif" font-size="18" fill="#f0d3a8">result fast.</text>
</svg>
