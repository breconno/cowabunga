<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520" role="img" aria-labelledby="title desc">
  <title id="title">Plan Mode</title>
  <desc id="desc">A ninja reviewing a scroll route to the dojo, representing Plan Mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c231c" /><stop offset="100%" stop-color="#03100e" />
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#123222" /><stop offset="100%" stop-color="#0c231c" />
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe08a" /><stop offset="100%" stop-color="#e8a33d" />
    </linearGradient>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <pattern id="grate" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M0 0 L36 0 M0 0 L0 36" stroke="#7cff6b" stroke-opacity="0.06" stroke-width="1.3" />
    </pattern>
    <g id="pizzaBlade">
      <path d="M0,0 L26,-6.5 A28,28 0 0 1 26,6.5 Z" fill="url(#cheese)" stroke="#7c4a12" stroke-width="2" stroke-linejoin="round" />
      <circle cx="13" cy="-2" r="1.9" fill="#c23b3b" /><circle cx="17" cy="2.7" r="1.6" fill="#c23b3b" />
    </g>
  </defs>

  <rect width="400" height="520" rx="20" fill="url(#bg)" stroke="#7cff6b" stroke-width="2.5" filter="url(#softShadow)" />
  <rect width="400" height="520" rx="20" fill="url(#grate)" />

  <path d="M0,20 A20,20 0 0 1 20,0 L380,0 A20,20 0 0 1 400,20 L400,86 L0,86 Z" fill="url(#header)" />
  <text x="200" y="52" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700" fill="#f4fbf5">Plan Mode</text>
  <rect x="30" y="70" width="340" height="2" fill="#7cff6b" opacity="0.4" />

  <!-- scene -->
  <rect x="24" y="106" width="352" height="270" rx="14" fill="#0a1f16" stroke="#7cff6b" stroke-opacity="0.25" stroke-width="2" />
  <circle cx="100" cy="330" r="90" fill="#7cff6b" opacity="0.05" />

  <!-- turtle ninja from behind, looking at scroll-tablet -->
  <g transform="translate(105 300)">
    <path d="M-42,50 C-42,-6 42,-6 42,50 L42,66 C42,74 34,80 24,80 L-24,80 C-34,80 -42,74 -42,66 Z" fill="#1a4a30" stroke="#7cff6b" stroke-width="3" />
    <rect x="-42" y="8" width="84" height="20" fill="#0a1f16" stroke="#7cff6b" stroke-width="2" />
    <path d="M42,12 L64,4 M42,26 L64,32" stroke="#c23b3b" stroke-width="5" stroke-linecap="round" />
  </g>

  <!-- scroll tablet with route -->
  <g transform="translate(230 220)">
    <rect x="-20" y="-10" width="150" height="180" rx="10" fill="#0f2c22" stroke="#7cff6b" stroke-width="3" />
    <path d="M10,150 L10,110 L60,90 L60,50 L100,25" fill="none" stroke="#e8a33d" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round" />
    <circle cx="10" cy="150" r="8" fill="none" stroke="#f4fbf5" stroke-width="3" />
    <circle cx="60" cy="90" r="7" fill="none" stroke="#f4fbf5" stroke-width="3" />
    <circle cx="60" cy="50" r="7" fill="none" stroke="#f4fbf5" stroke-width="3" />
    <g transform="translate(10 150)" filter="url(#neonGlow)">
      <path d="M0,0 m-16,0 a16,16 0 1,1 32,0 a16,16 0 1,1 -32,0" fill="#c23b3b" />
      <path d="M-4,-4 L4,-4 L4,4 L-4,4 Z" fill="#f4fbf5" />
    </g>
    <g transform="translate(100 20) scale(0.8)" filter="url(#neonGlow)">
      <use href="#pizzaBlade" transform="rotate(0)" /><use href="#pizzaBlade" transform="rotate(90)" />
      <use href="#pizzaBlade" transform="rotate(180)" /><use href="#pizzaBlade" transform="rotate(270)" />
      <circle r="6" fill="#0f2c22" stroke="#7cff6b" stroke-width="2" />
    </g>
  </g>

  <line x1="30" y1="392" x2="370" y2="392" stroke="#7cff6b" stroke-opacity="0.25" stroke-width="2" />
  <text x="30" y="428" font-family="Verdana, Geneva, sans-serif" font-size="26" font-weight="700" fill="#f4fbf5">Scroll route to the dojo</text>
  <text x="30" y="466" font-family="Verdana, Geneva, sans-serif" font-size="19" fill="#b9efc7">Map out the route, review stops,</text>
  <text x="30" y="492" font-family="Verdana, Geneva, sans-serif" font-size="19" fill="#b9efc7">agree on the plan, then strike.</text>
</svg>
