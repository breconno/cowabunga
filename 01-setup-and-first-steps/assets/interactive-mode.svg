<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520" role="img" aria-labelledby="title desc">
  <title id="title">Interactive Mode</title>
  <desc id="desc">Two ninjas talking to the sensei, representing Interactive Mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c231c" /><stop offset="100%" stop-color="#03100e" />
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a4414" /><stop offset="100%" stop-color="#3a2c0e" />
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <pattern id="grate" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M0 0 L36 0 M0 0 L0 36" stroke="#7cff6b" stroke-opacity="0.06" stroke-width="1.3" />
    </pattern>
    <g id="turtleHead">
      <path d="M-42,50 C-42,-6 42,-6 42,50 L42,66 C42,74 34,80 24,80 L-24,80 C-34,80 -42,74 -42,66 Z" fill="#1a4a30" stroke="#7cff6b" stroke-width="3" />
      <rect x="-42" y="8" width="84" height="20" fill="#0a1f16" stroke="#7cff6b" stroke-width="2" />
    </g>
  </defs>

  <rect width="400" height="520" rx="20" fill="url(#bg)" stroke="#e8a33d" stroke-width="2.5" filter="url(#softShadow)" />
  <rect width="400" height="520" rx="20" fill="url(#grate)" />

  <path d="M0,20 A20,20 0 0 1 20,0 L380,0 A20,20 0 0 1 400,20 L400,86 L0,86 Z" fill="url(#header)" />
  <text x="200" y="52" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="30" font-weight="700" fill="#f4fbf5">Interactive Mode</text>
  <rect x="30" y="70" width="340" height="2" fill="#e8a33d" opacity="0.5" />

  <!-- scene -->
  <rect x="24" y="106" width="352" height="270" rx="14" fill="#0a1f16" stroke="#e8a33d" stroke-opacity="0.25" stroke-width="2" />
  <circle cx="200" cy="300" r="120" fill="#e8a33d" opacity="0.04" />

  <!-- two turtles facing each other -->
  <g transform="translate(140 300)"><use href="#turtleHead" /></g>
  <g transform="translate(260 300) scale(-1,1)">
    <use href="#turtleHead" />
    <path d="M42,12 L64,4 M42,26 L64,32" stroke="#c23b3b" stroke-width="5" stroke-linecap="round" />
  </g>

  <!-- speech bubbles -->
  <g transform="translate(120 190)">
    <path d="M0,26 a26,26 0 1,1 52,0 a26,26 0 0,1 -18,25 l-8,13 l-3,-13 a26,26 0 0,1 -23,-25 Z" fill="#0f2c22" stroke="#7cff6b" stroke-width="3" />
  </g>
  <g transform="translate(230 218)">
    <path d="M0,20 a20,20 0 1,1 40,0 a20,20 0 0,1 -14,19 l-6,10 l-2,-10 a20,20 0 0,1 -18,-19 Z" fill="#0f2c22" stroke="#e8a33d" stroke-width="3" />
  </g>

  <line x1="30" y1="392" x2="370" y2="392" stroke="#e8a33d" stroke-opacity="0.3" stroke-width="2" />
  <text x="30" y="428" font-family="Verdana, Geneva, sans-serif" font-size="26" font-weight="700" fill="#f4fbf5">Talking to the sensei</text>
  <text x="30" y="466" font-family="Verdana, Geneva, sans-serif" font-size="19" fill="#f0d3a8">Real-time conversation, ask questions,</text>
  <text x="30" y="492" font-family="Verdana, Geneva, sans-serif" font-size="19" fill="#f0d3a8">customize your order.</text>
</svg>
