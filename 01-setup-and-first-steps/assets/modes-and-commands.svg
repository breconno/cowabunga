<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">Modes and Commands console</title>
  <desc id="desc">A three-panel dojo control console representing plan, interactive, and programmatic commands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03100e" /><stop offset="100%" stop-color="#050f0c" />
    </linearGradient>
    <linearGradient id="panelG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#123222" /><stop offset="100%" stop-color="#0a1f16" /></linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a4414" /><stop offset="100%" stop-color="#2c2109" /></linearGradient>
    <linearGradient id="panelR" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a1f1f" /><stop offset="100%" stop-color="#2c0f0f" /></linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe08a" /><stop offset="100%" stop-color="#e8a33d" /></linearGradient>
    <filter id="glowG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
    <pattern id="grate" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M0 0 L30 0 M0 0 L0 30" stroke="#7cff6b" stroke-opacity="0.05" stroke-width="1" /></pattern>
  </defs>

  <rect width="1200" height="580" fill="url(#bg)" />
  <rect width="1200" height="580" fill="url(#grate)" />

  <!-- Panel 1: Plan (green) -->
  <g transform="translate(20 20)">
    <rect width="373" height="540" rx="14" fill="url(#panelG)" stroke="#7cff6b" stroke-width="2" />
    <rect x="24" y="24" width="325" height="200" rx="8" fill="#03100e" stroke="#7cff6b" stroke-width="2" />
    <g transform="translate(186 124)" filter="url(#glowG)">
      <circle r="70" fill="none" stroke="#7cff6b" stroke-width="2" opacity="0.5" />
      <circle r="70" fill="none" stroke="#7cff6b" stroke-width="2" opacity="0.5" transform="rotate(45)" />
      <path d="M0,-70 A70,70 0 0 1 60,35" fill="none" stroke="#7cff6b" stroke-width="4" />
      <circle r="8" fill="#7cff6b" />
      <path d="M-30,-10 L0,20 L40,-25" fill="none" stroke="#e8a33d" stroke-width="4" stroke-dasharray="1 8" stroke-linecap="round" />
    </g>
    <g transform="translate(50 260)">
      <rect x="0" y="0" width="26" height="90" rx="6" fill="#0a1f16" stroke="#7cff6b" stroke-width="2" />
      <circle cx="13" cy="30" r="10" fill="#7cff6b" />
      <rect x="46" y="0" width="26" height="90" rx="6" fill="#0a1f16" stroke="#7cff6b" stroke-width="2" />
      <circle cx="59" cy="55" r="10" fill="#7cff6b" />
    </g>
    <circle cx="270" cy="330" r="34" fill="#0a1f16" stroke="#7cff6b" stroke-width="3" />
    <circle cx="270" cy="330" r="5" fill="#7cff6b" />
    <g fill="#7cff6b">
      <circle cx="140" cy="380" r="5" /><circle cx="160" cy="380" r="5" /><circle cx="180" cy="380" r="5" /><circle cx="200" cy="380" r="5" />
    </g>
    <rect x="24" y="420" width="325" height="14" rx="4" fill="#0a1f16" />
    <rect x="24" y="420" width="200" height="14" rx="4" fill="#7cff6b" opacity="0.8" />
    <text x="186" y="490" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700" fill="#f4fbf5">Plan</text>
  </g>

  <!-- Panel 2: Interactive (amber) -->
  <g transform="translate(413 20)">
    <rect width="373" height="540" rx="14" fill="url(#panelA)" stroke="#e8a33d" stroke-width="2" />
    <rect x="24" y="24" width="325" height="200" rx="8" fill="#03100e" stroke="#e8a33d" stroke-width="2" />
    <g transform="translate(186 124)" filter="url(#glowG)">
      <path d="M-140,0 L-100,0 L-90,-30 L-70,40 L-50,-50 L-30,50 L-10,0 L140,0" fill="none" stroke="#e8a33d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <g transform="translate(50 260)">
      <rect x="0" y="0" width="26" height="90" rx="6" fill="#0a1f16" stroke="#e8a33d" stroke-width="2" />
      <circle cx="13" cy="45" r="10" fill="#e8a33d" />
      <rect x="46" y="0" width="26" height="90" rx="6" fill="#0a1f16" stroke="#e8a33d" stroke-width="2" />
      <circle cx="59" cy="25" r="10" fill="#e8a33d" />
    </g>
    <circle cx="270" cy="330" r="34" fill="#0a1f16" stroke="#e8a33d" stroke-width="3" />
    <circle cx="270" cy="330" r="5" fill="#e8a33d" />
    <g fill="#e8a33d">
      <circle cx="140" cy="380" r="5" /><circle cx="160" cy="380" r="5" /><circle cx="180" cy="380" r="5" /><circle cx="200" cy="380" r="5" />
    </g>
    <rect x="24" y="420" width="325" height="14" rx="4" fill="#0a1f16" />
    <rect x="24" y="420" width="260" height="14" rx="4" fill="#e8a33d" opacity="0.8" />
    <text x="186" y="490" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700" fill="#f4fbf5">Interactive</text>
  </g>

  <!-- Panel 3: Programmatic (red) -->
  <g transform="translate(806 20)">
    <rect width="373" height="540" rx="14" fill="url(#panelR)" stroke="#c23b3b" stroke-width="2" />
    <rect x="24" y="24" width="325" height="200" rx="8" fill="#03100e" stroke="#c23b3b" stroke-width="2" />
    <g transform="translate(186 124)" filter="url(#glowG)">
      <path d="M-130,30 L-70,30 L-40,-30 L0,30 L40,-10 L80,30 L130,30" fill="none" stroke="#c23b3b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="-70" cy="30" r="5" fill="#f4fbf5" /><circle cx="-40" cy="-30" r="5" fill="#f4fbf5" />
      <circle cx="0" cy="30" r="5" fill="#f4fbf5" /><circle cx="40" cy="-10" r="5" fill="#f4fbf5" /><circle cx="80" cy="30" r="5" fill="#f4fbf5" />
    </g>
    <g transform="translate(60 260)">
      <circle cx="20" cy="20" r="20" fill="#0a1f16" stroke="#c23b3b" stroke-width="3" />
      <circle cx="80" cy="20" r="20" fill="#0a1f16" stroke="#c23b3b" stroke-width="3" />
      <circle cx="140" cy="20" r="20" fill="#0a1f16" stroke="#c23b3b" stroke-width="3" />
      <circle cx="200" cy="20" r="20" fill="#0a1f16" stroke="#c23b3b" stroke-width="3" />
    </g>
    <circle cx="270" cy="330" r="34" fill="#0a1f16" stroke="#c23b3b" stroke-width="3" />
    <circle cx="270" cy="330" r="5" fill="#c23b3b" />
    <g fill="#c23b3b">
      <circle cx="140" cy="380" r="5" /><circle cx="160" cy="380" r="5" /><circle cx="180" cy="380" r="5" /><circle cx="200" cy="380" r="5" />
    </g>
    <rect x="24" y="420" width="325" height="14" rx="4" fill="#0a1f16" />
    <rect x="24" y="420" width="150" height="14" rx="4" fill="#c23b3b" opacity="0.8" />
    <text x="186" y="490" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700" fill="#f4fbf5">Programmatic</text>
  </g>
</svg>
