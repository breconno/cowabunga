<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">First Copilot Experience</title>
  <desc id="desc">A ninja silhouette at a terminal, screen glowing with code under a starfield.</desc>
  <defs>
    <radialGradient id="glow" cx="62%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#3a6b2f" /><stop offset="35%" stop-color="#12351f" /><stop offset="100%" stop-color="#03100e" />
    </radialGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe08a" /><stop offset="100%" stop-color="#e8a33d" /></linearGradient>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- stars -->
  <g fill="#eafff0">
    <circle cx="120" cy="80" r="2" /><circle cx="220" cy="140" r="1.4" /><circle cx="340" cy="60" r="2.2" />
    <circle cx="460" cy="110" r="1.6" /><circle cx="700" cy="70" r="2" /><circle cx="820" cy="130" r="1.5" />
    <circle cx="940" cy="90" r="2.4" /><circle cx="1050" cy="60" r="1.6" /><circle cx="1120" cy="150" r="2" />
    <circle cx="180" cy="220" r="1.4" /><circle cx="1000" cy="220" r="1.8" /><circle cx="900" cy="180" r="1.3" />
    <circle cx="60" cy="180" r="1.6" /><circle cx="1150" cy="80" r="1.3" /><circle cx="640" cy="40" r="1.6" />
  </g>
  <g fill="#e8a33d" opacity="0.8">
    <circle cx="760" cy="150" r="2.2" /><circle cx="500" cy="50" r="1.6" /><circle cx="1080" cy="180" r="1.8" />
  </g>

  <!-- second monitor, dim -->
  <rect x="60" y="330" width="150" height="100" rx="6" fill="#0a1f16" stroke="#7cff6b" stroke-opacity="0.3" stroke-width="2" />

  <!-- desk -->
  <rect x="0" y="470" width="1200" height="20" fill="#0a1f16" />

  <!-- main monitor -->
  <g transform="translate(340 130)">
    <rect x="0" y="0" width="600" height="330" rx="14" fill="#03100e" stroke="#7cff6b" stroke-width="3" />
    <rect x="14" y="14" width="572" height="302" fill="#050f0c" />
    <g font-family="Courier New, monospace" font-size="18" fill="#7cff6b">
      <text x="34" y="50">$ copilot</text>
      <text x="34" y="82" fill="#e8a33d">&gt; explain this repo</text>
      <text x="34" y="114">Scanning files ████████░░ 80%</text>
      <text x="34" y="146">Found 3 modules, 2 tests</text>
      <text x="34" y="178" fill="#e8a33d">&gt; run the tests</text>
      <text x="34" y="210">12 passed, 0 failed ✓</text>
      <text x="34" y="250" fill="#f4fbf5">Cowabunga. Ready when you are.</text>
    </g>
    <rect x="230" y="140" width="14" height="490" fill="none" />
  </g>

  <!-- turtle-ninja silhouette from behind -->
  <g transform="translate(600 470)">
    <path d="M-100,0 L-100,-70 Q-100,-90 -80,-90 L80,-90 Q100,-90 100,-70 L100,0 Z" fill="#040c09" />
    <path d="M-70,-90 C-70,-170 70,-170 70,-90 L70,-64 C70,-52 58,-44 44,-44 L-44,-44 C-58,-44 -70,-52 -70,-64 Z" fill="#050f0c" stroke="#1a4a30" stroke-width="2" />
    <rect x="-70" y="-128" width="140" height="26" fill="#040c09" />
    <path d="M70,-124 L94,-134 M70,-104 L94,-96" stroke="#c23b3b" stroke-width="6" stroke-linecap="round" />
    <rect x="-24" y="0" width="18" height="70" fill="#040c09" />
    <rect x="6" y="0" width="18" height="70" fill="#040c09" />
  </g>

  <!-- mug with steam -->
  <g transform="translate(300 440)">
    <path d="M0,0 h34 v22 a17,17 0 0 1 -34,0 Z" fill="#0a1f16" stroke="#7cff6b" stroke-opacity="0.5" stroke-width="2" />
    <path d="M34,6 q14,0 14,12 q0,12 -14,12" fill="none" stroke="#7cff6b" stroke-opacity="0.5" stroke-width="2" />
    <path d="M8,-8 q-4,-10 0,-18 M18,-8 q-4,-10 0,-18" fill="none" stroke="#e8a33d" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- pizza slice easter egg -->
  <g transform="translate(880 452)">
    <path d="M0,0 L46,-12 A50,50 0 0 1 46,12 Z" fill="url(#cheese)" stroke="#7c4a12" stroke-width="2.5" stroke-linejoin="round" />
    <circle cx="24" cy="-4" r="3.4" fill="#c23b3b" /><circle cx="32" cy="5" r="2.8" fill="#c23b3b" /><circle cx="16" cy="6" r="2.4" fill="#c23b3b" />
  </g>

  <!-- small plant -->
  <g transform="translate(1080 430)">
    <path d="M0,40 L-10,40 L-6,10 L6,10 L10,40 Z" fill="#0a1f16" stroke="#7cff6b" stroke-opacity="0.4" stroke-width="2" />
    <path d="M0,10 C-14,-4 -18,-24 -8,-34 C-6,-18 -2,-10 0,10 Z" fill="#1a4a30" />
    <path d="M0,10 C14,-6 20,-26 10,-38 C6,-20 2,-8 0,10 Z" fill="#245c39" />
    <path d="M0,10 C2,-10 2,-24 -2,-34 C2,-24 4,-10 0,10 Z" fill="#7cff6b" opacity="0.7" />
  </g>
</svg>
